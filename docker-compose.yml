# AI Research Radar — Docker Compose 部署
# 启动：docker compose up -d
# 包含：PostgreSQL + FastAPI + Next.js + Nginx + 定时信号采集

services:
  # ============================================================
  # PostgreSQL 数据库
  # ============================================================
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: research_radar
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d research_radar"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # FastAPI 后端 API
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD}@db:5432/research_radar
      LLM_API_KEY: ${LLM_API_KEY:-unused}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8000:8000"

  # ============================================================
  # Next.js 前端 SSR
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"

  # ============================================================
  # Nginx 反向代理（HTTP，可后续加 HTTPS）
  # ============================================================
  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ============================================================
  # 定时信号采集（纯爬虫 cron，无需 LLM）
  # ============================================================
  collector:
    build:
      context: .
      dockerfile: deploy/Dockerfile.collector
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-radar}:${POSTGRES_PASSWORD}@db:5432/research_radar
      TZ: Asia/Shanghai

volumes:
  pgdata:
